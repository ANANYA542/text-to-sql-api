# Enterprise Text-to-SQL Engine — Docker Compose
#
# Usage:
#   docker-compose up --build
#   docker-compose up -d  (detached mode)

version: "3.8"

services:
  api:
    build: .
    container_name: text-to-sql-api
    ports:
      - "8001:8001"
    env_file:
      - .env
    volumes:
      # Persist database across container restarts
      - ./database:/app/database
      # Persist trained model artifacts
      - ./models:/app/models
      # Persist HuggingFace model cache
      - ./.cache:/app/.cache
    environment:
      - PYTHONUNBUFFERED=1
      - HF_HOME=/app/.cache/huggingface
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; r=requests.get('http://localhost:8001/'); exit(0 if r.status_code == 200 else 1)"]
      interval: 30s
      timeout: 10s
      start_period: 120s
      retries: 3
